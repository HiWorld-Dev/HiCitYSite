];

function useCountUp(target, duration = 1200) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const num = parseFloat(target);
    if (isNaN(num)) { setVal(target); return; }
    const start = performance.now();
    const step = (now) => {
      const p = Math.min((now - start) / duration, 1);
      setVal(Math.floor(p * num));
      if (p < 1) ref.current = requestAnimationFrame(step);
    };
    ref.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(ref.current);
  }, [target]);
  return val;
}

function StatItem({ num, label, sub }) {
  const raw = parseInt(num);
  const animated = useCountUp(isNaN(raw) ? num : raw);
  const display = isNaN(raw) ? num : (num.includes('+') ? animated + '+' : animated);
  return (
    <div className="stat-item">
      <div className="stat-num en-title">{display}</div>
      <div className="stat-label">{label}</div>
      <div className="stat-sub">{sub}</div>
    </div>
  );
}

    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);

  const tabKeys = Object.keys(t.cases.list);

            {theme === 'dark' ? '☀️' : '🌙'}

          <h1 className="hero-title">
            {t.hero.title}<br /><span className="accent">{t.hero.subtitle}</span>

          <p className="hero-desc">{t.hero.desc}</p>
          <div className="hero-btns">
            <button className="btn-primary" onClick={() => document.getElementById('about').scrollIntoView({behavior:'smooth'})}>{t.hero.cta1}</button>
            <button className="btn-outline" onClick={() => document.getElementById('contact').scrollIntoView({behavior:'smooth'})}>{t.hero.cta2}</button>
          </div>
        </div>
        <div className="hero-scroll">
          <div className="scroll-line"></div>
          scroll
        </div>

            <h2 className="section-title">{t.about.title}</h2>
            <div className="divider"></div>
            <p style={{fontSize:'15px',color:'var(--text2)',lineHeight:'1.9',marginBottom:'16px'}}>{t.about.p1}</p>

      <section id="cases" className="section section-alt">
        <div className="section-tag">{t.cases.tag}</div>
        <h2 className="section-title">{t.cases.title}</h2>
        <div className="divider"></div>
        <div className="cases-tabs">
          {t.cases.tabs.map((tab, i) => (
            <button key={i} className={`case-tab${caseTab === i ? ' active' : ''}`} onClick={() => setCaseTab(i)}>{tab}</button>
          ))}
        </div>
        <div className="cases-list">
          {(t.cases.list[tabKeys[caseTab]] || []).map((item, i) => (
            <div key={i} className="case-item">
              <span className="case-arrow">›</span>
              <span>{item}</span>
            </div>
          ))}
        </div>
      </section>

      {/* PARTNERS */}
      <section id="partners" className="section">
        <div style={{textAlign:'center'}}>
          <div className="section-tag">{t.partners.tag}</div>
          <h2 className="section-title">{t.partners.title}</h2>
          <div className="divider" style={{margin:'20px auto 0'}}></div>
        </div>
        <div className="partners-grid">
          {PARTNERS.map((p, i) => (
            <div key={i} className="partner-logo">
              <img src={p.src} alt={p.name} loading="lazy" />
            </div>
          ))}
        </div>
        <p style={{textAlign:'center',marginTop:'32px',fontSize:'13px',color:'var(--text3)'}}>
          {lang === 'zh' ? '还有更多合作伙伴，覆盖中国、日本、加拿大、香港等国家/地区' :
           lang === 'en' ? 'And many more partners across China, Japan, Canada, and Hong Kong' :
           'さらに多くのパートナーが中国、日本、カナダ、香港などで活動中'}
        </p>
      </section>

      {/* CONTACT */}
      <section id="contact" className="section section-alt">
        <div className="contact-grid">
          <div className="contact-img-wrap">
            <img src={window.__resources.imgOffice} alt="HiCitY Office" loading="lazy" />
          </div>
          <div className="contact-info">
            <div className="section-tag">{t.contact.tag}</div>
            <h2 className="section-title">{t.contact.title}</h2>
            <p style={{fontSize:'15px',color:'var(--text2)',lineHeight:'1.8',marginTop:'-8px'}}>{t.contact.desc}</p>
            <div className="divider" style={{margin:'8px 0'}}></div>
            <div className="contact-brand en-title">HiCitY.World</div>
            <div className="contact-company">{t.contact.company}</div>
            <div className="contact-slogan">{t.contact.slogan}</div>
            <div className="contact-rows">
              <div className="contact-row">
                <span className="contact-icon">📍</span>
                <div className="contact-val"><strong>{lang === 'zh' ? '地址' : lang === 'en' ? 'Address' : '住所'}：</strong>{t.contact.addr}</div>
              </div>
              <div className="contact-row">
                <span className="contact-icon">📞</span>
                <div className="contact-val"><strong>{lang === 'zh' ? '电话' : lang === 'en' ? 'Phone' : '電話'}：</strong>{t.contact.phone}</div>
              </div>
            </div>
            <button className="btn-primary" style={{width:'fit-content',marginTop:'8px'}} onClick={() => window.location.href='tel:+8613504264321'}>{t.contact.btn}</button>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer>
        <div className="footer-logo en-title">HiCitY 海思特</div>
        <div className="footer-right">
          <div>{t.footer.rights}</div>
          <div style={{marginTop:'4px'}}>{t.footer.icp}</div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
